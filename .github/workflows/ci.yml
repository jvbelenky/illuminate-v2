name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: No leftover diagnostic scaffolding
        run: |
          if grep -rn "TEMP DIAG\|\[DIAG\]" src/ 2>/dev/null; then
            echo "::error::Diagnostic scaffolding committed — remove before merge."
            exit 1
          fi
      - name: Unit conversion factor stays in unitConversion.ts
        run: |
          if grep -rn "0\.3048" src/ --include='*.ts' --include='*.svelte' | grep -v "utils/unitConversion"; then
            echo "::error::Hardcoded 0.3048 outside unitConversion.ts — import from there."
            exit 1
          fi
      - run: pnpm check
      - run: pnpm test:run

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: No leftover diagnostic scaffolding
        run: |
          if grep -rn "TEMP DIAG\|\[DIAG\]" api/ 2>/dev/null; then
            echo "::error::Diagnostic scaffolding committed — remove before merge."
            exit 1
          fi
      - run: uv sync --no-sources --locked --dev
      - name: Run tests (ignore segfault-on-exit from kaleido)
        run: |
          uv run --no-sources pytest tests/
          status=$?
          if [ $status -eq 139 ]; then exit 0; else exit $status; fi
        shell: bash {0}

  e2e-tests:
    name: E2E Tests
    needs: [ui-tests, api-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install UI dependencies
        run: cd ui && pnpm install --frozen-lockfile
      - name: Install API dependencies
        run: cd api && uv sync --no-sources --locked --dev
      - name: Install e2e dependencies
        run: cd e2e && npm ci
      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium
      # Guards against the timeout/sleep ratchet restarting. Sleeps hide races
      # instead of fixing them, and per-test timeouts drift upward until the suite
      # stops catching anything. Waits belong in helpers as real conditions; the
      # one sanctioned test.setTimeout (save-load) carries its measured receipt.
      - name: No sleeps or ad-hoc timeouts in specs
        run: |
          cd e2e
          if grep -rn "waitForTimeout" tests/; then
            echo "::error::waitForTimeout in tests/ — wait on a condition, not a duration."
            exit 1
          fi
          if grep -rn "test.setTimeout" tests/ | grep -v "save-load.spec.ts"; then
            echo "::error::New test.setTimeout — fix the wait, or justify it with a measured p100."
            exit 1
          fi
      - name: Run e2e tests
        run: cd e2e && npx playwright test
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build .

  contract:
    name: API Contract Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd api && uv sync --no-sources --locked --dev
      - run: cd ui && pnpm install --frozen-lockfile
      - name: Regenerate and diff
        run: |
          # Subshells keep each cd scoped, so a non-zero exit aborts the step at
          # the failing line under `set -e` instead of silently leaking cwd into
          # the next command and mislabeling the crash as a stale contract.
          ( cd api && uv run --no-sources python scripts/export_openapi.py )
          ( cd ui && pnpm generate:api )
          git diff --exit-code api/openapi.json ui/src/lib/api/generated/api-types.ts || {
            echo "::error::Generated API contract is stale. Run 'make generate-api' and commit."
            exit 1
          }
